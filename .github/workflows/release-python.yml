name: release-python

on:
  push:
    tags:
      - "python-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading python-v)"
        required: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout hawcx_agentic_sdk
        uses: actions/checkout@v4
        with:
          path: hx_agentic_sdk

      - name: Checkout hx_agent_client_auth_service (sibling)
        uses: actions/checkout@v4
        with:
          repository: hawcx/hx_agent_client_auth_service
          token: ${{ secrets.GITHUB_TOKEN }}
          path: hx_agent_client_auth_service
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            hx_agent_client_auth_service/target/
          key: cargo-py-${{ matrix.target }}-${{ hashFiles('hx_agent_client_auth_service/**/Cargo.lock') }}
          restore-keys: |
            cargo-py-${{ matrix.target }}-

      - name: Configure hawcx cargo registry
        shell: bash
        env:
          CARGO_HAWCX_TOKEN: ${{ secrets.CARGO_HAWCX_TOKEN }}
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [registries.hawcx]
          index = "sparse+https://cargo.hawcx.com/api/v1/crates/"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF
          cat > ~/.cargo/credentials.toml <<EOF
          [registries.hawcx]
          token = "${CARGO_HAWCX_TOKEN}"
          EOF
          chmod 600 ~/.cargo/credentials.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install "maturin>=1.5,<2.0"

      - name: Build wheel
        working-directory: hx_agentic_sdk/python
        shell: bash
        run: |
          maturin build \
            --release \
            --target ${{ matrix.target }} \
            --manifest-path ../../hx_agent_client_auth_service/crates/hawcx-manager/Cargo.toml \
            --out dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: hx_agentic_sdk/python/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install "maturin>=1.5,<2.0"
      - name: Build sdist
        working-directory: python
        run: maturin sdist --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  test-matrix:
    name: test py${{ matrix.python }} on ${{ matrix.os }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Resolve target for this runner
        id: target
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)     echo "target=x86_64-unknown-linux-gnu"  >> $GITHUB_OUTPUT ;;
            Linux-ARM64)   echo "target=aarch64-unknown-linux-gnu" >> $GITHUB_OUTPUT ;;
            macOS-ARM64)   echo "target=aarch64-apple-darwin"      >> $GITHUB_OUTPUT ;;
            Windows-X64)   echo "target=x86_64-pc-windows-msvc"    >> $GITHUB_OUTPUT ;;
            Windows-ARM64) echo "target=aarch64-pc-windows-msvc"   >> $GITHUB_OUTPUT ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
      - uses: actions/download-artifact@v4
        with:
          name: python-wheel-${{ steps.target.outputs.target }}
          path: dist/
      - name: Install wheel + test deps
        shell: bash
        run: |
          pip install --upgrade pip
          pip install dist/*.whl
          pip install pytest pytest-asyncio
      - name: Run tests
        working-directory: python
        run: pytest -v

  publish:
    name: publish to PyPI
    needs: [build, build-sdist, test-matrix]
    runs-on: ubuntu-latest
    environment: pypi-production
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: dist/
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
