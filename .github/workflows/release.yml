name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v4
        with:
          path: hx_agentic_sdk

      # The SDK workspace path-deps to ../hx_agent_crypto_core/crates/*
      # and hx_agent_client_auth_service path-deps to the same sibling.
      # Both must be checked out at the same level as hx_agentic_sdk so
      # the relative paths resolve at build time.
      #
      # Same-org private repos auto-grant read access to GITHUB_TOKEN;
      # no separate PAT needed. (The retired HX_LABS_READ_TOKEN PAT
      # reference was removed 2026-05-21 with the hx_labs migration.)
      # Sibling-checkout of hx_agent_crypto_core has been removed —
      # crypto-core crates are now resolved from the private Kellnr at
      # cargo.hawcx.com (see workspace.dependencies in Cargo.toml +
      # Configure hawcx cargo registry step below). The lockstep
      # crypto-core tagging discipline added in #20 is no longer
      # required for SDK releases; crypto-core publishes on its own
      # cadence and the SDK pins to whatever version it depends on.

      - name: Checkout hx_agent_client_auth_service (sibling)
        uses: actions/checkout@v4
        with:
          repository: hawcx/hx_agent_client_auth_service
          token: ${{ secrets.GITHUB_TOKEN }}
          path: hx_agent_client_auth_service
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps (libdbus for keyring)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo registry + target dirs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            hx_agent_client_auth_service/target/
            hx_agentic_sdk/target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('hx_agent_client_auth_service/**/Cargo.lock', 'hx_agentic_sdk/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      # Configure the private Kellnr registry so cargo can resolve any
      # crates published from hx_agent_crypto_core (haap-core etc.) once
      # the Cargo.toml migration from path-deps to version-deps lands in
      # a follow-up PR. Until that migration ships, this is a no-op at
      # build time — Cargo.toml still references sibling-checkout paths.
      #
      # Kellnr expects the raw token in the Authorization header (NOT
      # "Bearer <token>"). cargo passes the credentials.toml value
      # verbatim, so do not add a prefix.
      - name: Configure hawcx cargo registry
        shell: bash
        env:
          CARGO_HAWCX_TOKEN: ${{ secrets.CARGO_HAWCX_TOKEN }}
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [registries.hawcx]
          index = "sparse+https://cargo.hawcx.com/api/v1/crates/"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF
          cat > ~/.cargo/credentials.toml <<EOF
          [registries.hawcx]
          token = "${CARGO_HAWCX_TOKEN}"
          EOF
          chmod 600 ~/.cargo/credentials.toml

      - name: Build client_auth_service binaries
        working-directory: hx_agent_client_auth_service
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin haap-authenticator \
            --bin haap-tqs-precompute \
            --bin haap-tqs-jit \
            --bin haap-assembler \
            --bin haap-eib \
            --bin haap-supervisor
        shell: bash

      - name: Build SDK binary (haap-sdk; all platforms)
        working-directory: hx_agentic_sdk
        run: |
          cargo build --release --target ${{ matrix.target }} --bin haap-sdk
        shell: bash

      # haap-rsv is the MCP-server-side verifier sidecar (sits in front of
      # the resource server). It uses Unix domain sockets + SO_PEERCRED
      # for the local-sidecar trust model (CS v7.2.5 §39.12.1), so it is
      # Unix-only by design. Server operators deploy it as a Linux
      # container; Windows does not need a haap-rsv binary.
      - name: Build SDK binary (haap-rsv; Unix only)
        if: runner.os != 'Windows'
        working-directory: hx_agentic_sdk
        run: |
          cargo build --release --target ${{ matrix.target }} --bin haap-rsv
        shell: bash

      - name: Package distribution tarball
        shell: bash
        run: |
          mkdir -p dist
          OUT="hx-agent-sdk-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$OUT/bin"
          # client_auth_service agent-side runtime: supervisor + 5
          # protected children. Per CS v7.2.5 §35.6 and §39.12, these
          # run on the agent host (Linux / macOS / Windows) with
          # platform-native IPC (UDS on Unix family, named pipes with
          # DACL on Windows).
          for b in haap-authenticator haap-tqs-precompute haap-tqs-jit haap-assembler haap-eib haap-supervisor; do
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              cp "hx_agent_client_auth_service/target/${{ matrix.target }}/release/$b.exe" "$OUT/bin/"
            else
              cp "hx_agent_client_auth_service/target/${{ matrix.target }}/release/$b" "$OUT/bin/"
            fi
          done
          # SDK CLI: agent-side, all platforms.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "hx_agentic_sdk/target/${{ matrix.target }}/release/haap-sdk.exe" "$OUT/bin/"
          else
            cp "hx_agentic_sdk/target/${{ matrix.target }}/release/haap-sdk" "$OUT/bin/"
            # haap-rsv: MCP-server-side, Unix-only (see §39.12.1).
            cp "hx_agentic_sdk/target/${{ matrix.target }}/release/haap-rsv" "$OUT/bin/"
          fi
          cp hx_agentic_sdk/README.md "$OUT/" 2>/dev/null || true
          cp -r hx_agentic_sdk/docs "$OUT/" 2>/dev/null || true
          tar -czf "dist/$OUT.tar.gz" "$OUT"

      - name: Upload distribution artifact (release asset)
        uses: actions/upload-artifact@v4
        with:
          name: hx-agent-sdk-${{ matrix.target }}
          path: dist/*

      - name: Stage Docker binaries (flat layout)
        if: contains(matrix.target, 'linux-gnu')
        shell: bash
        run: |
          mkdir -p docker-staging
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-authenticator docker-staging/
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-tqs-precompute docker-staging/
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-tqs-jit docker-staging/
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-assembler docker-staging/
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-eib docker-staging/
          cp hx_agent_client_auth_service/target/${{ matrix.target }}/release/haap-supervisor docker-staging/
          cp hx_agentic_sdk/target/${{ matrix.target }}/release/haap-rsv docker-staging/
          cp hx_agentic_sdk/target/${{ matrix.target }}/release/haap-sdk docker-staging/
          ls -la docker-staging/

      - name: Upload Linux binaries for Docker (linux only)
        if: contains(matrix.target, 'linux-gnu')
        uses: actions/upload-artifact@v4
        with:
          name: docker-bins-${{ matrix.target }}
          path: docker-staging/

  docker:
    name: docker ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - platform: linux/arm64
            arch_suffix: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v4

      - name: Download pre-built Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: docker-bins-${{ matrix.target }}
          path: ./prebuilt-bins

      - name: Make binaries executable
        run: chmod +x ./prebuilt-bins/*

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push single-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.fast
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-${{ matrix.arch_suffix }}
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,scope=${{ matrix.arch_suffix }},mode=max

  docker_manifest:
    name: docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }} \
            -t ghcr.io/hawcx/hx-agent-sdk:latest \
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-amd64 \
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-arm64

      - name: Verify manifest
        run: |
          docker buildx imagetools inspect ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}

  bundle_smoke_test:
    name: bundle smoke test
    runs-on: ubuntu-latest
    needs: [docker_manifest]
    # The bundle pulls both the SDK image (just published above) and the
    # CAA image (published from hx_agent_client_admin_service on its own
    # release cadence). smoke-test.sh self-skips (exit 0 with explanation)
    # when the matching hx-caa:${HAAP_VERSION} manifest is absent, so a
    # red here means a real structural breakage (compose syntax,
    # entrypoint, env handling) — NOT "we haven't tagged CAA yet."
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bundle smoke test
        env:
          HAAP_VERSION: ${{ github.ref_name }}
          CI: "1"
        run: |
          cd docker/bundle
          ./smoke-test.sh

  github_release:
    name: create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          pattern: "hx-agent-sdk-*"
          merge-multiple: true

      - name: List downloaded assets (diagnostic)
        run: ls -lah ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            HAAP SDK release ${{ github.ref_name }}.

            ## Distribution

            **Binary tarballs** (attached below):
            - Linux x86_64 / aarch64
            - macOS aarch64 (Apple Silicon)
            - Windows x86_64 / aarch64

            **Multi-arch Docker image**:
            ```
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}
            ghcr.io/hawcx/hx-agent-sdk:latest
            ```
            Supports `linux/amd64` and `linux/arm64`.

            ## Contents

            **Agent-side runtime** (all platforms — Linux, macOS, Windows):
            the supervisor and the 5 protected child processes that form
            the per-agent runtime per CS v7.2.5 §35.6:

            - `haap-supervisor` — lifecycle, zero crypto material
            - `haap-authenticator` — holds IK_i, performs X3DH (§4.2.1)
            - `haap-tqs-precompute` — session-scoped, holds K_session_root (§40)
            - `haap-tqs-jit` — request-scoped, paired 1:1 with Assembler
            - `haap-assembler` — single-flight crypto-proxy (§39)
            - `haap-eib` — External Identity Broker, OAuth bearer isolation (§45)

            On Windows, supervisor↔child IPC uses Named Pipes with DACL
            restricting access to the current user SID + SYSTEM, per
            CS v7.2.5 §39.12.2. On Linux / macOS, IPC uses Unix domain
            sockets with `SO_PEERCRED` / `LOCAL_PEERCRED`, per §39.12.1.

            **SDK CLI** (all platforms): `haap-sdk`

            **MCP server-side sidecar** (Linux / macOS only): `haap-rsv`
            sits in front of the resource server and is deployed by MCP
            server operators (typically as a Linux container). It is
            Unix-only by design (UDS + peer-credential checks for the
            local-sidecar trust model).

            ## Evaluation bundle

            A Docker Compose bundle that spins up CAA + RSV together for local
            evaluation is available at `docker/bundle/`:

            ```bash
            git clone -b ${{ github.ref_name }} https://github.com/hawcx/hx_agentic_sdk
            cd hx_agentic_sdk/docker/bundle
            cp .env.example .env
            # Edit .env with tenant credentials
            docker compose up
            ```

            See [docker/bundle/README.md](https://github.com/hawcx/hx_agentic_sdk/blob/${{ github.ref_name }}/docker/bundle/README.md) for details.

            ## Status

            Pre-product alpha release. Customer evaluation only. Production deployment not yet recommended.

            See [build workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for build details.
          files: ./release-assets/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          fail_on_unmatched_files: false
