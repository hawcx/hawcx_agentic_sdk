name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v6

      # F-2 sibling-checkout migration (2026-05-27): hawcx-manager is
      # no longer built in-pipeline from a sibling clone of
      # hx_agent_client_auth_service. It's published to the private
      # Kellnr at cargo.hawcx.com on tag push and installed here via
      # `cargo install hawcx-manager --registry hawcx --locked`. This
      # mirrors release-node.yml's build-binary job.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps (libdbus for keyring)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Configure hawcx cargo registry
        shell: bash
        env:
          CARGO_HAWCX_TOKEN: ${{ secrets.CARGO_HAWCX_TOKEN }}
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [registries.hawcx]
          index = "sparse+https://cargo.hawcx.com/api/v1/crates/"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF
          cat > ~/.cargo/credentials.toml <<EOF
          [registries.hawcx]
          token = "${CARGO_HAWCX_TOKEN}"
          EOF
          chmod 600 ~/.cargo/credentials.toml

      # Exact-match binary cache, keyed by tag + target. No restore-keys
      # fallback — a stale binary from a prior tag must never be
      # silently reused for a new release.
      - name: Restore cached hawcx-manager binary
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/staging/bin
          key: hawcx-manager-${{ matrix.target }}-${{ github.ref_name }}

      - name: Install hawcx-manager from hawcx registry
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cargo install hawcx-manager \
            --registry hawcx \
            --target ${{ matrix.target }} \
            --root "${RUNNER_TEMP}/staging" \
            --locked

      - name: Save hawcx-manager binary to cache
        if: steps.cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/staging/bin
          key: hawcx-manager-${{ matrix.target }}-${{ github.ref_name }}

      - name: Package distribution tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OUT="hx-agent-sdk-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$OUT/bin"
          # client_auth_service agent-side runtime: supervisor + 5
          # protected children + the haap-sdk demo CLI all dispatched
          # off a single multi-call binary (hawcx-manager) per CS
          # v7.2.5 §35.6 + §39.12 and the Phase 3-5 cutover memo at
          # /hx_agent_canonical_spec/DESIGN-MEMO-MULTICALL-BINARY.md.
          #
          # 2026-05-22 (Phase 3-5): one real binary + 7 legacy aliases.
          # Unix → symlinks; Windows → .exe copies (symlinks require
          # admin/dev-mode and are not MDM-friendly).
          LEGACY_NAMES="haap-authenticator haap-tqs-precompute haap-tqs-jit haap-assembler haap-eib haap-supervisor haap-sdk"
          BIN_DIR="${RUNNER_TEMP}/staging/bin"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN_DIR/hawcx-manager.exe" "$OUT/bin/"
            for n in $LEGACY_NAMES; do
              cp "$OUT/bin/hawcx-manager.exe" "$OUT/bin/$n.exe"
            done
          else
            cp "$BIN_DIR/hawcx-manager" "$OUT/bin/"
            (cd "$OUT/bin" && for n in $LEGACY_NAMES; do
              ln -sf hawcx-manager "$n"
            done)
          fi
          cp README.md "$OUT/" 2>/dev/null || true
          cp -r docs "$OUT/" 2>/dev/null || true
          tar -czf "dist/$OUT.tar.gz" "$OUT"

      - name: Upload distribution artifact (release asset)
        uses: actions/upload-artifact@v7
        with:
          name: hx-agent-sdk-${{ matrix.target }}
          path: dist/*

      - name: Stage Docker binaries (flat layout)
        if: contains(matrix.target, 'linux-gnu')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docker-staging
          # Phase 3-5 cutover (2026-05-22): only the real binary
          # (hawcx-manager) is uploaded as the docker-bins artifact.
          # actions/upload-artifact@v7 dereferences symlinks when
          # zipping; the 7 legacy aliases are regenerated on the docker
          # job runner BEFORE the build context is assembled.
          cp "${RUNNER_TEMP}/staging/bin/hawcx-manager" docker-staging/
          ls -la docker-staging/

      - name: Upload Linux binaries for Docker (linux only)
        if: contains(matrix.target, 'linux-gnu')
        uses: actions/upload-artifact@v7
        with:
          name: docker-bins-${{ matrix.target }}
          path: docker-staging/

  docker:
    name: docker ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: amd64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - platform: linux/arm64
            arch_suffix: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout hx_agentic_sdk
        uses: actions/checkout@v6

      - name: Download pre-built Linux binaries
        uses: actions/download-artifact@v8
        with:
          name: docker-bins-${{ matrix.target }}
          path: ./prebuilt-bins

      - name: Make binaries executable + generate legacy symlinks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./prebuilt-bins/hawcx-manager
          # Phase 3-5 cutover (2026-05-22): regenerate the 7 legacy-name
          # symlinks here because actions/upload-artifact@v7 dereferences
          # symlinks when zipping (so they couldn't survive the matrix-job
          # → docker-job artifact roundtrip). Building them here means
          # the Dockerfile.fast `COPY prebuilt-bins/ /usr/local/bin/`
          # step lands a real binary + 7 symlinks under one COPY, and
          # distroless never needs to run a shell.
          (cd ./prebuilt-bins && for n in haap-authenticator haap-tqs-precompute haap-tqs-jit haap-assembler haap-eib haap-supervisor haap-sdk; do
            ln -sf hawcx-manager "$n"
          done)
          ls -la ./prebuilt-bins/

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push single-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fast
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-${{ matrix.arch_suffix }}
          cache-from: type=gha,scope=${{ matrix.arch_suffix }}
          cache-to: type=gha,scope=${{ matrix.arch_suffix }},mode=max

  docker_manifest:
    name: docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the moving dist-tag for this release: prereleases
      # (alpha/beta/rc) move the matching channel tag (e.g. `alpha`),
      # GA releases move `latest`. This mirrors the npm dist-tag
      # discipline in release-node.yml so a customer pulling
      # `ghcr.io/hawcx/hx-agent-sdk:alpha` always lands on the latest
      # alpha image. NEVER point `:latest` at a prerelease — that's
      # how an evaluator accidentally ships unreleased code.
      - name: Compute moving dist-tag
        id: dist
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF_NAME" in
            *alpha*) echo "moving_tag=alpha" >> "$GITHUB_OUTPUT" ;;
            *beta*)  echo "moving_tag=beta"  >> "$GITHUB_OUTPUT" ;;
            *rc*)    echo "moving_tag=rc"    >> "$GITHUB_OUTPUT" ;;
            *)       echo "moving_tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create + push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }} \
            -t ghcr.io/hawcx/hx-agent-sdk:${{ steps.dist.outputs.moving_tag }} \
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-amd64 \
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}-arm64

      - name: Verify manifest (per-tag + multi-arch platforms)
        run: |
          set -euo pipefail
          docker buildx imagetools inspect ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}
          # Fail loudly if either platform is missing from the
          # multi-arch index — alpha.10 silently shipped without this
          # check, and an arm64 regression would be invisible until a
          # customer on Apple Silicon hit `exec format error`.
          platforms=$(docker buildx imagetools inspect \
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }} \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}')
          echo "platforms: $platforms"
          for p in linux/amd64 linux/arm64; do
            case " $platforms " in
              *" $p "*) ;;
              *) echo "::error::manifest missing platform $p"; exit 1 ;;
            esac
          done

  bundle_smoke_test:
    name: bundle smoke test
    runs-on: ubuntu-latest
    needs: [docker_manifest]
    # The bundle pulls both the SDK image (just published above) and the
    # CAA image (published from hx_agent_client_admin_service on its own
    # release cadence). smoke-test.sh self-skips (exit 0 with explanation)
    # when the matching hx-caa:${HAAP_VERSION} manifest is absent, so a
    # red here means a real structural breakage (compose syntax,
    # entrypoint, env handling) — NOT "we haven't tagged CAA yet."
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bundle smoke test
        env:
          HAAP_VERSION: ${{ github.ref_name }}
          CI: "1"
        run: |
          cd docker/bundle
          ./smoke-test.sh

  github_release:
    name: create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets
          pattern: "hx-agent-sdk-*"
          merge-multiple: true

      - name: List downloaded assets (diagnostic)
        run: ls -lah ./release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            HAAP SDK release ${{ github.ref_name }}.

            ## Distribution

            **Binary tarballs** (attached below):
            - Linux x86_64 / aarch64
            - macOS aarch64 (Apple Silicon)
            - Windows x86_64 / aarch64

            **Multi-arch Docker image** (supports `linux/amd64` and
            `linux/arm64`):
            ```
            ghcr.io/hawcx/hx-agent-sdk:${{ github.ref_name }}
            ```
            Prereleases (alpha/beta/rc) also move the matching channel
            tag (`:alpha`, `:beta`, `:rc`). `:latest` is reserved for
            GA releases.

            ## Contents

            **Multi-call binary** (Phase 3-5 cutover, 2026-05-22): the
            tarball / image now ships ONE real binary, `hawcx-manager`,
            with 7 legacy-name symlinks (Unix) or .exe copies (Windows)
            that dispatch by argv[0] to the corresponding role:

            - `haap-supervisor` → `hawcx-manager supervisor` (lifecycle, zero crypto material)
            - `haap-authenticator` → `hawcx-manager authenticator` (holds IK_i, X3DH per §4.2.1)
            - `haap-tqs-precompute` → `hawcx-manager tqs-precompute` (session-scoped K_session_root per §40)
            - `haap-tqs-jit` → `hawcx-manager tqs-jit` (request-scoped, paired 1:1 with Assembler)
            - `haap-assembler` → `hawcx-manager assembler` (single-flight crypto-proxy per §39)
            - `haap-eib` → `hawcx-manager eib` (External Identity Broker, OAuth bearer per §45)
            - `haap-sdk` → `hawcx-manager sdk` (demo / debug CLI)

            Existing customer scripts that invoke `haap-supervisor`,
            `haap-authenticator`, etc. continue to work unchanged — the
            symlinks preserve every legacy call site. Direct invocation
            via `hawcx-manager <subcommand>` is also supported.

            On Windows, supervisor↔child IPC uses Named Pipes with DACL
            restricting access to the current user SID + SYSTEM, per
            CS v7.2.5 §39.12.2. On Linux / macOS, IPC uses Unix domain
            sockets with `SO_PEERCRED` / `LOCAL_PEERCRED`, per §39.12.1.

            **MCP server-side sidecar** (`haap-rsv`) ships from a
            separate image as of 2026-05-21:
            `ghcr.io/hawcx/haap-rsv:${{ github.ref_name }}`. Source lives
            in `hx_agent_authorizer/crates/haap-rsv-bin`. It is Unix-only
            by design (UDS + peer-credential checks for the
            local-sidecar trust model per §39.12.1).

            ## Evaluation bundle

            A Docker Compose bundle that spins up CAA + RSV together for local
            evaluation is available at `docker/bundle/`:

            ```bash
            git clone -b ${{ github.ref_name }} https://github.com/hawcx/hx_agentic_sdk
            cd hx_agentic_sdk/docker/bundle
            cp .env.example .env
            # Edit .env with tenant credentials
            docker compose up
            ```

            See [docker/bundle/README.md](https://github.com/hawcx/hx_agentic_sdk/blob/${{ github.ref_name }}/docker/bundle/README.md) for details.

            ## Status

            Pre-product alpha release. Customer evaluation only. Production deployment not yet recommended.

            See [build workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for build details.
          files: ./release-assets/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          fail_on_unmatched_files: false
