name: release-node

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading node-v)"
        required: true

jobs:
  build-binary:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            platform_pkg: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            platform_pkg: linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            platform_pkg: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform_pkg: win32-x64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            platform_pkg: win32-arm64

    steps:
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Configure hawcx cargo registry
        shell: bash
        env:
          CARGO_HAWCX_TOKEN: ${{ secrets.CARGO_HAWCX_TOKEN }}
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [registries.hawcx]
          index = "sparse+https://cargo.hawcx.com/api/v1/crates/"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF
          cat > ~/.cargo/credentials.toml <<EOF
          [registries.hawcx]
          token = "${CARGO_HAWCX_TOKEN}"
          EOF
          chmod 600 ~/.cargo/credentials.toml

      - name: Install hawcx-manager from hawcx registry
        shell: bash
        run: |
          cargo install hawcx-manager \
            --registry hawcx \
            --target ${{ matrix.target }} \
            --root "${RUNNER_TEMP}/staging" \
            --locked

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_pkg }}
          path: |
            ${{ runner.temp }}/staging/bin/hawcx-manager
            ${{ runner.temp }}/staging/bin/hawcx-manager.exe
          if-no-files-found: warn

  test-matrix:
    name: test node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install + typecheck + test
        working-directory: node
        run: |
          npm ci
          npm run typecheck
          npm test

  publish-platform-packages:
    name: publish ${{ matrix.platform_pkg }}
    needs: [build-binary, test-matrix]
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_pkg: linux-x64
            binary_name: hawcx-manager
          - platform_pkg: linux-arm64
            binary_name: hawcx-manager
          - platform_pkg: darwin-arm64
            binary_name: hawcx-manager
          - platform_pkg: win32-x64
            binary_name: hawcx-manager.exe
          - platform_pkg: win32-arm64
            binary_name: hawcx-manager.exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.platform_pkg }}
          path: binary/
      - name: Stage binary into platform package
        shell: bash
        run: |
          BINARY_SRC="binary/${{ matrix.binary_name }}"
          if [[ ! -f "$BINARY_SRC" ]]; then
            echo "Binary not found: $BINARY_SRC"
            exit 1
          fi
          cp "$BINARY_SRC" "node/platforms/${{ matrix.platform_pkg }}/${{ matrix.binary_name }}"
          chmod +x "node/platforms/${{ matrix.platform_pkg }}/${{ matrix.binary_name }}" || true
      - name: Publish platform package
        working-directory: node/platforms/${{ matrix.platform_pkg }}
        run: npm publish --provenance --access public --tag alpha

  publish-main:
    name: publish @hawcx/hawcx-haap
    needs: [publish-platform-packages]
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - name: Install + build
        working-directory: node
        run: |
          npm ci
          npm run build
      - name: Publish
        working-directory: node
        run: npm publish --provenance --access public --tag alpha
