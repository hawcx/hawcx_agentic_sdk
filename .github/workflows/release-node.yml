name: release-node

on:
  push:
    tags:
      - "node-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading node-v)"
        required: true

jobs:
  test-matrix:
    name: test node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install + typecheck + test
        working-directory: node
        run: |
          npm ci
          npm run typecheck
          npm test

  publish:
    name: publish to npm
    needs: test-matrix
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      id-token: write   # required for npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - name: Diagnostics — npm CLI + OIDC env
        run: |
          echo "--- npm/node versions ---"
          npm --version
          node --version
          echo "--- .npmrc contents (auth lines redacted) ---"
          cat ~/.npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=<redacted>/' || echo "no ~/.npmrc"
          echo "--- OIDC env vars present? ---"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL" && echo "ACTIONS_ID_TOKEN_REQUEST_URL: set" || echo "ACTIONS_ID_TOKEN_REQUEST_URL: MISSING"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" && echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: set" || echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: MISSING"
      - name: Install + build
        working-directory: node
        run: |
          npm ci
          npm run build
      - name: Publish
        working-directory: node
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --provenance --access public --tag alpha --loglevel verbose
