name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install + typecheck + test
        working-directory: node
        run: |
          npm ci
          npm run typecheck
          npm test

  python:
    name: python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # The Python package is pure-Python (hatchling backend). The bundled
      # hawcx-manager binary ships only in the release platform wheels, so the
      # editable dev install needs NO Rust toolchain and NO cargo registry.
      - name: Install + test
        working-directory: python
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          pytest -v
